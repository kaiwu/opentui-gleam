name = "opentui_testing"
version = "0.1.0"
gleam = ">= 1.15.0"
description = "Testing utilities for OpenTUI Gleam — synthetic input, frame snapshots, widget verification"
licences = ["MIT"]

target = "javascript"

[javascript]
runtime = "bun"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
opentui_core = { path = "../opentui_core" }
opentui_runtime = { path = "../opentui_runtime" }
opentui_ui = { path = "../opentui_ui" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"

[repository]
type = "github"
user = "kaiwu"
repo = "opentui-gleam"
path = "packages/opentui_testing"
tag_prefix = "opentui_testing-"
